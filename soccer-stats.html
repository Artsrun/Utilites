<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Stats</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4ade80;
      margin-bottom: 24px;
    }
    .match-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      background: #16213e;
      border-radius: 12px;
      padding: 16px 32px;
    }
    .team { text-align: center; }
    .team-name { font-size: 1.1rem; font-weight: 700; }
    .score {
      font-size: 3rem;
      font-weight: 900;
      color: #4ade80;
      padding: 0 12px;
    }
    .separator { color: #555; font-size: 1.5rem; }
    .cards-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 28px;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
      min-width: 140px;
    }
    .card-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .card-value { font-size: 1.8rem; font-weight: 700; color: #4ade80; }
    canvas { display: block; border-radius: 12px; }
    .section { margin-bottom: 28px; width: 100%; max-width: 700px; }
    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>⚽ Soccer Stats</h1>

  <!-- Match Header -->
  <div class="match-header">
    <div class="team">
      <div class="team-name">FC Home</div>
      <div style="font-size:0.8rem;color:#888;">Host</div>
    </div>
    <div class="score">3</div>
    <div class="separator">:</div>
    <div class="score">1</div>
    <div class="team">
      <div class="team-name">FC Away</div>
      <div style="font-size:0.8rem;color:#888;">Guest</div>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="cards-row">
    <div class="card"><div class="card-label">Possession</div><div class="card-value">58%</div></div>
    <div class="card"><div class="card-label">Shots</div><div class="card-value">14</div></div>
    <div class="card"><div class="card-label">On Target</div><div class="card-value">6</div></div>
    <div class="card"><div class="card-label">Corners</div><div class="card-value">7</div></div>
    <div class="card"><div class="card-label">Fouls</div><div class="card-value">11</div></div>
  </div>

  <!-- Bar Stats -->
  <div class="section">
    <div class="section-title">Team Comparison</div>
    <canvas id="barCanvas" width="700" height="280"></canvas>
  </div>

  <!-- Field + Shot Map -->
  <div class="section">
    <div class="section-title">Shot Map</div>
    <canvas id="fieldCanvas" width="700" height="420"></canvas>
  </div>

  <!-- Timeline -->
  <div class="section">
    <div class="section-title">Match Timeline</div>
    <canvas id="timelineCanvas" width="700" height="100"></canvas>
  </div>

<script>
// ── Palette ──────────────────────────────────────────────────────────────────
const HOME = '#4ade80';
const AWAY = '#f87171';
const BG   = '#16213e';
const TEXT = '#eeeeee';
const MUTED= '#555';

// ── Bar Chart ────────────────────────────────────────────────────────────────
(function drawBars() {
  const canvas = document.getElementById('barCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = BG;
  ctx.roundRect(0, 0, W, H, 12);
  ctx.fill();

  const stats = [
    { label: 'Possession %', home: 58, away: 42, max: 100 },
    { label: 'Shots',        home: 14, away:  8, max: 20  },
    { label: 'On Target',    home:  6, away:  3, max: 10  },
    { label: 'Corners',      home:  7, away:  4, max: 12  },
    { label: 'Fouls',        home: 11, away: 14, max: 20  },
  ];

  const rowH = (H - 40) / stats.length;
  const barMaxW = (W / 2) - 80;

  ctx.font = '13px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillStyle = MUTED;
  ctx.fillText('FC Home', W * 0.22, 24);
  ctx.fillText('FC Away', W * 0.78, 24);

  stats.forEach((s, i) => {
    const cy = 40 + rowH * i + rowH / 2;
    const homeW = (s.home / s.max) * barMaxW;
    const awayW = (s.away / s.max) * barMaxW;

    // home bar (right→left from center)
    ctx.fillStyle = HOME + '33';
    ctx.beginPath();
    ctx.roundRect(W / 2 - 60 - homeW, cy - 10, homeW, 20, 4);
    ctx.fill();
    ctx.fillStyle = HOME;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 60 - homeW, cy - 10, homeW, 20, 4);
    ctx.fill();

    // away bar
    ctx.fillStyle = AWAY;
    ctx.beginPath();
    ctx.roundRect(W / 2 + 60, cy - 10, awayW, 20, 4);
    ctx.fill();

    // label
    ctx.fillStyle = TEXT;
    ctx.font = '12px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(s.label, W / 2, cy + 4);

    // values
    ctx.fillStyle = HOME;
    ctx.textAlign = 'right';
    ctx.fillText(s.home, W / 2 - 65, cy + 4);
    ctx.fillStyle = AWAY;
    ctx.textAlign = 'left';
    ctx.fillText(s.away, W / 2 + 65, cy + 4);
  });
})();

// ── Football Field + Shot Map ────────────────────────────────────────────────
(function drawField() {
  const canvas = document.getElementById('fieldCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Grass background
  ctx.fillStyle = '#166534';
  ctx.roundRect(0, 0, W, H, 12);
  ctx.fill();

  // Grass stripes
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.04)';
    ctx.fillRect(i * (W / 8), 0, W / 8, H);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;

  const pad = 30;
  const fw = W - pad * 2;
  const fh = H - pad * 2;

  // Outline
  ctx.strokeRect(pad, pad, fw, fh);

  // Centre line
  ctx.beginPath();
  ctx.moveTo(W / 2, pad);
  ctx.lineTo(W / 2, H - pad);
  ctx.stroke();

  // Centre circle
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 55, 0, Math.PI * 2);
  ctx.stroke();

  // Centre dot
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 4, 0, Math.PI * 2);
  ctx.fill();

  // Penalty areas
  const paW = fw * 0.18, paH = fh * 0.45;
  // Left
  ctx.strokeRect(pad, H / 2 - paH / 2, paW, paH);
  // Right
  ctx.strokeRect(W - pad - paW, H / 2 - paH / 2, paW, paH);

  // Goal areas
  const gaW = fw * 0.07, gaH = fh * 0.22;
  ctx.strokeRect(pad, H / 2 - gaH / 2, gaW, gaH);
  ctx.strokeRect(W - pad - gaW, H / 2 - gaH / 2, gaW, gaH);

  // Penalty spots
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(pad + fw * 0.12, H / 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(W - pad - fw * 0.12, H / 2, 3, 0, Math.PI * 2); ctx.fill();

  // ── Shots ──
  const homeShots = [
    { x: 0.80, y: 0.40, goal: true  },
    { x: 0.85, y: 0.55, goal: true  },
    { x: 0.78, y: 0.65, goal: true  },
    { x: 0.88, y: 0.35, goal: false },
    { x: 0.72, y: 0.30, goal: false },
    { x: 0.75, y: 0.70, goal: false },
    { x: 0.65, y: 0.48, goal: false },
  ];
  const awayShots = [
    { x: 0.20, y: 0.50, goal: true  },
    { x: 0.16, y: 0.42, goal: false },
    { x: 0.22, y: 0.60, goal: false },
    { x: 0.28, y: 0.35, goal: false },
  ];

  function drawShot(sx, sy, color, goal) {
    const cx = pad + sx * fw;
    const cy = pad + sy * fh;
    ctx.beginPath();
    ctx.arc(cx, cy, goal ? 9 : 7, 0, Math.PI * 2);
    ctx.fillStyle = goal ? color : 'transparent';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = goal ? 2 : 2;
    ctx.stroke();
    if (!goal) {
      // X mark
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      const r = 4;
      ctx.beginPath();
      ctx.moveTo(cx - r, cy - r); ctx.lineTo(cx + r, cy + r);
      ctx.moveTo(cx + r, cy - r); ctx.lineTo(cx - r, cy + r);
      ctx.stroke();
    }
  }

  homeShots.forEach(s => drawShot(s.x, s.y, HOME, s.goal));
  awayShots.forEach(s => drawShot(s.x, s.y, AWAY, s.goal));

  // Legend
  ctx.font = '12px Segoe UI';
  ctx.fillStyle = HOME;
  ctx.beginPath(); ctx.arc(pad + 10, H - 14, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = TEXT; ctx.fillText('Home shots', pad + 20, H - 10);

  ctx.fillStyle = AWAY;
  ctx.beginPath(); ctx.arc(pad + 110, H - 14, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = TEXT; ctx.fillText('Away shots', pad + 120, H - 10);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('● goal   ✕ missed', W - 150, H - 10);
})();

// ── Timeline ─────────────────────────────────────────────────────────────────
(function drawTimeline() {
  const canvas = document.getElementById('timelineCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = BG;
  ctx.roundRect(0, 0, W, H, 12);
  ctx.fill();

  const pad = 40;
  const lineY = H / 2;
  const totalMin = 90;

  // Base line
  ctx.strokeStyle = MUTED;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(pad, lineY);
  ctx.lineTo(W - pad, lineY);
  ctx.stroke();

  // Minute ticks
  [0, 15, 30, 45, 60, 75, 90].forEach(m => {
    const x = pad + (m / totalMin) * (W - pad * 2);
    ctx.strokeStyle = MUTED;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, lineY - 6); ctx.lineTo(x, lineY + 6); ctx.stroke();
    ctx.fillStyle = '#666';
    ctx.font = '11px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(m === 0 ? 'KO' : m + "'", x, lineY + 20);
  });

  // Events: { min, type: 'goal'|'yellow'|'red'|'sub', team: 'home'|'away' }
  const events = [
    { min: 18, type: 'goal',   team: 'home' },
    { min: 34, type: 'yellow', team: 'away' },
    { min: 51, type: 'goal',   team: 'home' },
    { min: 63, type: 'goal',   team: 'away' },
    { min: 71, type: 'sub',    team: 'home' },
    { min: 78, type: 'yellow', team: 'home' },
    { min: 85, type: 'goal',   team: 'home' },
  ];

  events.forEach(ev => {
    const x = pad + (ev.min / totalMin) * (W - pad * 2);
    const above = ev.team === 'home';
    const ey = above ? lineY - 22 : lineY + 22;
    const color = ev.team === 'home' ? HOME : AWAY;

    if (ev.type === 'goal') {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, ey, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.font = 'bold 10px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('⚽', x - 0.5, ey + 4);
    } else if (ev.type === 'yellow') {
      ctx.fillStyle = '#facc15';
      ctx.beginPath();
      ctx.roundRect(x - 5, ey - 8, 10, 14, 2);
      ctx.fill();
    } else if (ev.type === 'red') {
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.roundRect(x - 5, ey - 8, 10, 14, 2);
      ctx.fill();
    } else if (ev.type === 'sub') {
      ctx.fillStyle = color;
      ctx.font = 'bold 14px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('↕', x, ey + 5);
    }

    // minute label
    ctx.fillStyle = color;
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(ev.min + "'", x, above ? ey - 12 : ey + 18);
  });
})();
</script>
</body>
</html>
